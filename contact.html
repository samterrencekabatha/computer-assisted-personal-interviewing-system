<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

.navbar {
  background: #111;
  padding: 15px;
}

.navbar a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
}

.hero {
  padding: 80px;
  background: linear-gradient(to right,#000,#333);
  color: white;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: white;
  border-radius: 8px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3, .card p {
  padding: 10px;
}
</style>
<body>

<h1>Contact Our Hotel</h1>

<section class="contact-box">
  <p><strong>📍 Location:</strong> Nairobi, Kenya</p>
  <p><strong>📞 Phone:</strong> +254 700 000 000</p>
  <p><strong>📧 Email:</strong> info@yourhotel.com</p>
  <p><strong>🕒 Reception:</strong> 24 Hours</p>
</section>

<img src="https://images.unsplash.com/photo-1559599101-f09722fb4948" class="contact-img">

</body>
</html>
