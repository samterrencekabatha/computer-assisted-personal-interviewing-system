<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
<style>* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  background: #f4f7fb;
}

/* Layout */
.dashboard {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: linear-gradient(180deg, #0d6efd, #0b5ed7);
  color: white;
  padding: 20px;
}

.logo {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 30px;
}

.sidebar nav a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 12px 15px;
  margin-bottom: 8px;
  border-radius: 8px;
  transition: 0.3s;
}

.sidebar nav a:hover,
.sidebar nav a.active {
  background: rgba(255, 255, 255, 0.2);
}

.logout {
  margin-top: 30px;
  background: rgba(255, 0, 0, 0.2);
}

/* Main */
.main {
  flex: 1;
  padding: 25px;
}

/* Topbar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.topbar h1 {
  color: #1f2d3d;
}

.user {
  background: white;
  padding: 8px 15px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: transform 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  color: #6c757d;
  font-size: 14px;
}

.card p {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
  color: #0d6efd;
}

/* Table */
.table-section {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.table-section h2 {
  margin-bottom: 15px;
  color: #1f2d3d;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #f1f5ff;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  color: #0d6efd;
  font-weight: 600;
}

tbody tr {
  border-bottom: 1px solid #eee;
}

tbody tr:hover {
  background: #f8f9ff;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    width: 70px;
  }

  .sidebar nav a {
    text-align: center;
    font-size: 12px;
  }

  .logo {
    font-size: 16px;
  }
}
/* WEB3 THEME OVERRIDES */
body {
  background: radial-gradient(circle at top, #020617, #000);
}

/* Sidebar upgrade */
.sidebar {
  background: linear-gradient(180deg, #020617, #020617);
  border-right: 1px solid rgba(0, 255, 255, 0.15);
}

/* Crypto Ad */
.crypto-ad {
  position: relative;
  margin-top: 30px;
  border-radius: 16px;
  overflow: hidden;
  height: 180px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(14px);
  box-shadow: 0 0 30px rgba(0,255,255,0.15);
}

.crypto-ad video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}

.ad-overlay {
  position: absolute;
  inset: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background: linear-gradient(
    to top,
    rgba(2,6,23,0.9),
    transparent
  );
}

.ad-overlay h4 {
  color: #67e8f9;
  font-size: 14px;
  text-transform: uppercase;
}

.ad-overlay p {
  font-size: 12px;
  color: #e5e7eb;
  margin: 4px 0 10px;
}

.ad-overlay button {
  background: linear-gradient(90deg, #22d3ee, #3b82f6);
  border: none;
  color: black;
  font-weight: 600;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.ad-overlay button:hover {
  box-shadow: 0 0 20px #22d3ee;
}
.crypto-ad.animated {
  background: linear-gradient(
    120deg,
    #020617,
    #0ea5e9,
    #020617
  );
  background-size: 300% 300%;
  animation: glow 6s ease infinite;
}

@keyframes glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.crypto-widget {
  margin-top: 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border-radius: 18px;
  padding: 20px;

.crypto-widget h2 {

.prices {

.price-card {

}

.price-card:hover {

.price-card h4 {

.price-card p {

.ad-rotation {

}

.ad-rotation img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.ad-info {
  padding: 12px;
}

.ad-info h4 {
  color: #67e8f9;
  font-size: 14px;
}

.ad-info p {
  font-size: 12px;
  color: #e5e7eb;
  margin: 6px 0;
}

.ad-info a {
  display: inline-block;

</style>

  <main class="main">
    <header class="topbar">
      <h1>Dashboard Overview</h1>
      <span class="user">👤 Admin</span>
    </header>

    <!-- Cards -->
    <section class="cards">
      <div class="card">
        <h3>Total Records</h3>
        <p>5,345</p>

      <div class="card">

    <!-- Table -->
    <section class="table-section">
      <h2>Recent Submissions</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>

      </table>

<form id="myForm">
  <input type="text" id="name" placeholder="Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <textarea id="message" placeholder="Message"></textarea>
  <button type="submit">Submit</button>
</form>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzhHTP-fFy64C0bGDEt8fgW1ZuFYww1qiwZsST53zsE-aCNxTiDdjZmF5u_3mPUOqOj/exec";

const form = document.getElementById("myForm");

form.addEventListener("submit", e => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("name", document.getElementById("name").value);
  formData.append("email", document.getElementById("email").value);
  formData.append("message", document.getElementById("message").value);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(() => {
    alert("Data saved successfully!");
    form.reset();
    loadTable(); // refresh table
  })
  .catch(err => console.error("Error!", err));
});
</script>

<script>
function loadTable() {
  fetch("https://script.google.com/macros/s/AKfycbzhHTP-fFy64C0bGDEt8fgW1ZuFYww1qiwZsST53zsE-aCNxTiDdjZmF5u_3mPUOqOj/exec")
    .then(res => res.json())
    .then(data => {
      const tableBody = document.getElementById("dataTable");
      tableBody.innerHTML = "";

      data.forEach(row => {
        tableBody.innerHTML += `
          <tr>
            <td>${row.Name}</td>
            <td>${row.Email}</td>
            <td>${row.Message}</td>
            <td>${row.Date}</td>
          </tr>
        `;
      });
    })
    .catch(err => console.error("Fetch Error:", err));
}

// Load data on page load
window.onload = loadTable;
</script>

</body>
