<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Check-In</title>
<style>
  /* Basic styling for the page */
  body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 20px; }
  h2 { color: #111827; }
  .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
  .form-group { flex: 1; min-width: 200px; }
  label { display: block; margin-bottom: 6px; font-weight: 500; }
  input, select { width: 100%; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #ccc; }
  button { padding: 10px 18px; border: none; border-radius: 999px; background: #0d6efd; color: #fff; cursor: pointer; margin-right: 10px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  table th, table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  table th { background: #f3f4f6; font-weight: 600; }
</style>
</head>
<body>

<h2>Hotel Check-In Form</h2>

<div class="form-row">
  <div class="form-group">
    <label>Transaction ID</label>
    <input type="text" id="txtTransID" readonly>
  </div>
  <div class="form-group">
    <label>Guest Name</label>
    <input type="text" id="txtGuestName" placeholder="Enter Guest Name">
  </div>
  <div class="form-group">
    <label>Room Number</label>
    <input type="text" id="txtRoomNumber" placeholder="Enter Room Number">
  </div>
  <div class="form-group">
    <label>Room Type</label>
    <input type="text" id="txtRoomType" placeholder="Enter Room Type">
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Check-In Date</label>
    <input type="date" id="txtCheckInDate">
  </div>
  <div class="form-group">
    <label>Check-Out Date</label>
    <input type="date" id="dtCheckOutDate">
  </div>
  <div class="form-group">
    <label>No. of Adults</label>
    <input type="number" id="txtAdults" min="0" value="0">
  </div>
  <div class="form-group">
    <label>No. of Children</label>
    <input type="number" id="txtChildren" min="0" value="0">
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Room Rate (Php)</label>
    <input type="number" id="txtRoomRate" min="0" step="0.01">
  </div>
  <div class="form-group">
    <label>Discount</label>
    <select id="cboDiscount"></select>
  </div>
  <div class="form-group">
    <label>Advance Payment (Php)</label>
    <input type="number" id="txtAdvance" min="0" step="0.01">
  </div>
  <div class="form-group">
    <label>Subtotal (Php)</label>
    <input type="text" id="txtSubTotal" readonly>
  </div>
  <div class="form-group">
    <label>Total (Php)</label>
    <input type="text" id="txtTotal" readonly>
  </div>
</div>

<div class="buttons">
  <button id="bttnCheckIn">Check In</button>
  <button id="bttnCancel">Cancel</button>
  <button id="bttnNextPage">Next Page</button>
</div>

<table id="lvlcheckin">
  <thead>
    <tr>
      <th>Trans ID</th>
      <th>Guest Name</th>
      <th>Room</th>
      <th>Check-In</th>
      <th>Check-Out</th>
      <th>Days</th>
      <th>Children</th>
      <th>Adults</th>
      <th>Advance</th>
      <th>Discount</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  // -------------------- Data & References --------------------
  let transactionCounter = 1;
  const discounts = [
    { id: 1, type: 'None', rate: 0 },
    { id: 2, type: 'Senior', rate: 0.2 },
    { id: 3, type: 'Promo', rate: 0.1 }
  ];
  const checkins = [];

  const txtTransID = document.getElementById('txtTransID');
  const txtGuestName = document.getElementById('txtGuestName');
  const txtRoomNumber = document.getElementById('txtRoomNumber');
  const txtRoomType = document.getElementById('txtRoomType');
  const txtCheckInDate = document.getElementById('txtCheckInDate');
  const dtCheckOutDate = document.getElementById('dtCheckOutDate');
  const txtAdults = document.getElementById('txtAdults');
  const txtChildren = document.getElementById('txtChildren');
  const txtRoomRate = document.getElementById('txtRoomRate');
  const cboDiscount = document.getElementById('cboDiscount');
  const txtAdvance = document.getElementById('txtAdvance');
  const txtSubTotal = document.getElementById('txtSubTotal');
  const txtTotal = document.getElementById('txtTotal');
  const lvlcheckin = document.querySelector('#lvlcheckin tbody');

  // -------------------- Initialize Form --------------------
  function initializeForm() {
    txtTransID.value = 'TransID-' + String(transactionCounter).padStart(4, '0');
    const today = new Date().toISOString().split('T')[0];
    txtCheckInDate.value = today;
    const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
    dtCheckOutDate.value = tomorrow;
    populateDiscounts();
    updateTotals();
  }

  function populateDiscounts() {
    cboDiscount.innerHTML = '';
    discounts.forEach(d => {
      const option = document.createElement('option');
      option.value = d.id;
      option.textContent = d.type;
      cboDiscount.appendChild(option);
    });
  }

  function calculateDays() {
    const checkIn = new Date(txtCheckInDate.value);
    const checkOut = new Date(dtCheckOutDate.value);
    const diffTime = checkOut - checkIn;
    return Math.max(Math.ceil(diffTime / (1000 * 60 * 60 * 24)), 1);
  }

  function updateTotals() {
    const rate = parseFloat(txtRoomRate.value) || 0;
    const days = calculateDays();
    const discountRate = discounts.find(d => d.id == cboDiscount.value)?.rate || 0;
    const subtotal = rate * days * (1 - discountRate);
    txtSubTotal.value = subtotal.toFixed(2);

    const advance = parseFloat(txtAdvance.value) || 0;
    txtTotal.value = Math.max(subtotal - advance, 0).toFixed(2);
  }

  function clearForm() {
    txtGuestName.value = '';
    txtRoomNumber.value = '';
    txtRoomType.value = '';
    txtAdults.value = 0;
    txtChildren.value = 0;
    txtRoomRate.value = '';
    cboDiscount.value = '';
    txtAdvance.value = '';
    initializeForm();
  }

  function displayCheckins() {
    lvlcheckin.innerHTML = '';
    checkins.forEach(c => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${c.transID}</td>
        <td>${c.guestName}</td>
        <td>${c.roomNumber}</td>
        <td>${c.checkIn}</td>
        <td>${c.checkOut}</td>
        <td>${c.days}</td>
        <td>${c.children}</td>
        <td>${c.adults}</td>
        <td>${c.advance.toFixed(2)}</td>
        <td>${c.discountType}</td>
        <td>${c.total.toFixed(2)}</td>
      `;
      lvlcheckin.appendChild(row);
    });
  }

  // -------------------- Event Listeners --------------------
  [txtRoomRate, dtCheckOutDate, txtCheckInDate, txtAdults, txtChildren, txtAdvance, cboDiscount].forEach(el => {
    el.addEventListener('input', updateTotals);
    el.addEventListener('change', updateTotals);
  });

  document.getElementById('bttnCheckIn').addEventListener('click', () => {
    const guestName = txtGuestName.value.trim();
    const roomNumber = txtRoomNumber.value.trim();
    const roomType = txtRoomType.value.trim();
    if (!guestName || !roomNumber || !roomType) {
      alert('Please fill all required fields!');
      return;
    }

    const days = calculateDays();
    const discount = discounts.find(d => d.id == cboDiscount.value) || { type: 'None', rate: 0 };
    const subtotal = parseFloat(txtSubTotal.value);
    const advance = parseFloat(txtAdvance.value) || 0;
    const total = parseFloat(txtTotal.value);

    checkins.push({
      transID: txtTransID.value,
      guestName,
      roomNumber,
      roomType,
      checkIn: txtCheckInDate.value,
      checkOut: dtCheckOutDate.value,
      days,
      children: parseInt(txtChildren.value),
      adults: parseInt(txtAdults.value),
      advance,
      discountType: discount.type,
      total
    });

    transactionCounter++;
    displayCheckins();
    clearForm();
    alert('Guest Successfully Checked In!');
  });

  document.getElementById('bttnCancel').addEventListener('click', clearForm);

  // -------------------- Next Page (Checkout) --------------------
  document.getElementById('bttnNextPage').addEventListener('click', () => {
    const guestName = txtGuestName.value.trim();
    const roomNumber = txtRoomNumber.value.trim();
    const roomType = txtRoomType.value.trim();
    if (!guestName || !roomNumber || !roomType) {
      alert('Please select a guest and room before proceeding!');
      return;
    }

    const checkinData = {
      transID: txtTransID.value,
      guestName,
      roomNumber,
      roomType,
      checkIn: txtCheckInDate.value,
      checkOut: dtCheckOutDate.value,
      adults: parseInt(txtAdults.value),
      children: parseInt(txtChildren.value),
      roomRate: parseFloat(txtRoomRate.value),
      discountID: cboDiscount.value,
      discountType: discounts.find(d => d.id == cboDiscount.value)?.type || "None",
      advance: parseFloat(txtAdvance.value) || 0,
      total: parseFloat(txtTotal.value)
    };

    localStorage.setItem("checkinData", JSON.stringify(checkinData));
    window.location.href = "checkout.html";
  });

  // -------------------- Initialize --------------------
  initializeForm();
</script>

</body>
</html>
